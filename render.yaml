# === Render.com deployment ===
services:
  - type: web
    name: benzo-services
    env: node
    region: frankfurt
    plan: free
    buildCommand: npm install
    startCommand: node server/index.js
    healthCheckPath: /api/health
    envVars:
      - key: ADMIN_PASS_1
        value: ""            # ← ВСТАВЬТЕ СВОЙ ПАРОЛЬ
      - key: ADMIN_PASS_2
        value: ""            # ← ВСТАВЬТЕ ПАРОЛЬ БЕНЗО
      - key: CORS_ORIGIN
        value: https://benzoservices.github.io
      - key: DB_PATH
        value: /var/data/data.db
